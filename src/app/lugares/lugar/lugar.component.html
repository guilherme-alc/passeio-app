<div class="rounded mx-auto max-w-lg p-2 shadow-lg my-4">
  <h3 class="font-semibold text-gray-700 text-md my-2">Novo Lugar</h3>
  <hr class="border-t">

  <form id="form" [formGroup]="form" (ngSubmit)="salvar()">
    <div class="py-2">
      <label class="text-md, text-gray-700 block mb-2" for="nome">Nome:</label>
      <input
        type="text"
        name="nome"
        id="nome"
        required
        placeholder="Ex: Praia do Forte, Cachoeira do Salto, Restaurante do Zé"
        class="border p-2 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500"
        formControlName="nome">
        <span class="text-red-500 text-sm block mt-1"
          *ngIf="seCampoInvalido('nome', 'required')" >Campo obrigatório</span>
        <span class="text-red-500 text-sm block mt-1"
          *ngIf="seCampoInvalido('nome', 'minlength')" >O nome deve ter no mínimo 3 caracteres</span>
        <span class="text-red-500 text-sm block mt-1"
          *ngIf="seCampoInvalido('nome', 'maxlength')" >O nome deve ter no máximo 150 caracteres</span>
    </div>

    <div class="py-2">
      <label class="text-md, text-gray-700 block mb-2" for="nome">Categoria</label>

    </div>

    <div class="py-2">
      <label class="text-md, text-gray-700 block mb-2" for="nome">Localização</label>
      <input
        type="text"
        name="local"
        id="local"
        required
        placeholder="Ex: Brumadinho"
        class="border p-2 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
        <span class="text-red-500 text-sm block mt-1"
          *ngIf="seCampoInvalido('local', 'required')" >Campo obrigatório</span>
        <span class="text-red-500 text-sm block mt-1"
          *ngIf="seCampoInvalido('local', 'minlength')" >O local deve ter no mínimo 2 caracteres</span>
        <span class="text-red-500 text-sm block mt-1"
          *ngIf="seCampoInvalido('local', 'maxlength')" >O local deve ter no máximo 150 caracteres</span>
    </div>

    <div class="py-2">
      <label class="text-md, text-gray-700 block mb-2" for="nome">Url da Foto</label>
      <input
        type="text"
        name="urlFoto"
        id="urlFoto"
        class="border p-2 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="py-2">
      <label class="text-md, text-gray-700 block mb-2" for="nome">Avaliação</label>

    </div>

    <div class="py-2">
      <button type="submit" class="w-full rounded bg-blue-500 text-white p-2 hover:bg-blue-600">
        Cadastrar Lugar
      </button>
    </div>
  </form>
 </div>
